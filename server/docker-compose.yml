version: '3'
services:
  web:
    build: . 
    env_file:
      - config.env
    volumes:
      - .:/app
    working_dir: /app
    # 启动前先运行初始化脚本，然后再启动 gunicorn
    command: sh -c "python init_db.py && gunicorn -w 4 -b 0.0.0.0:5000 app:app"
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
      - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
      - WX_APP_ID=${WX_APP_ID}
      - WX_APP_SECRET=${WX_APP_SECRET}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - db
      - redis

  worker:
    build: .
    env_file:
      - config.env
    volumes:
      - .:/app
    working_dir: /app
    command: celery -A tasks worker --loglevel=info
    environment:
      - DATABASE_URL=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
      - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}/0
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - config.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3377:3306"

  redis:
    image: redis:6-alpine

  adminer:
    image: adminer
    restart: always
    ports:
      - "8087:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha  # 可选：更美观的主题
    depends_on:
      - db

volumes:
  db_data:
